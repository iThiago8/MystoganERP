version: '3.9'

services:

  app:
    build: .
    container_name: mystogan_app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: mystogan_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mystogan_erp

    ports:
      - "5432:5432"